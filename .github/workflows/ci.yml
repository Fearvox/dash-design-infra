name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install
        run: bun install

      - name: Build Tokens
        run: bun tokens:build

      - name: Build Metrics
        run: bun metrics:build

      - name: Typecheck
        run: bun typecheck

      - name: Dependency Audit
        run: bun audit --audit-level high

      - name: Markdown Link Check
        run: bun docs:links

      - name: Public Boundary Scan
        run: bun security:scan

      - name: Hackathon Score
        run: bun hackathon:score
